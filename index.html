<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Code Finder</title>
<style>
  :root{
    --bg: #0b0d0c;
    --panel: rgba(18,20,18,0.86);
    --panel-border: rgba(255,255,255,0.08);
    --amber: #e0a940;
    --amber-dim: #7a5c26;
    --green: #4caf6d;
    --red: #d9634a;
    --ink: #eef0ea;
    --ink-dim: #9aa39a;
    --mono: 'SF Mono', ui-monospace, 'Courier New', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{
    margin:0; padding:0; height:100%; background:var(--bg); color:var(--ink);
    font-family:var(--sans); overflow:hidden; overscroll-behavior:none;
  }
  #app{ position:relative; width:100vw; height:100vh; height:100dvh; }

  video{
    position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
    background:#000; filter:brightness(0.92);
  }
  canvas.hidden-canvas{ display:none; }

  .scrim-top, .scrim-bottom{
    position:absolute; left:0; right:0; height:34%; pointer-events:none; z-index:2;
  }
  .scrim-top{ top:0; background:linear-gradient(to bottom, rgba(0,0,0,0.55), rgba(0,0,0,0)); }
  .scrim-bottom{ bottom:0; background:linear-gradient(to top, rgba(0,0,0,0.7), rgba(0,0,0,0)); }

  .guide{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:78vw; max-width:340px; height:110px;
    border:2.5px solid var(--amber-dim);
    border-radius:14px;
    z-index:3;
    transition: border-color 0.25s ease, box-shadow 0.25s ease;
  }
  .guide.active{ border-color: var(--amber); box-shadow:0 0 0 3000px rgba(0,0,0,0.18) inset, 0 0 24px rgba(224,169,64,0.25); }
  .guide.matched{ border-color: var(--green); box-shadow:0 0 0 3000px rgba(0,0,0,0.1) inset, 0 0 28px rgba(76,175,109,0.4); }
  .guide::before, .guide::after{ content:""; position:absolute; width:22px; height:22px; border-color:inherit; }
  .corner{position:absolute; width:22px; height:22px;}
  .corner.tl{top:-2.5px; left:-2.5px; border-top:2.5px solid; border-left:2.5px solid; border-color:inherit; border-radius:14px 0 0 0;}
  .corner.tr{top:-2.5px; right:-2.5px; border-top:2.5px solid; border-right:2.5px solid; border-color:inherit; border-radius:0 14px 0 0;}
  .corner.bl{bottom:-2.5px; left:-2.5px; border-bottom:2.5px solid; border-left:2.5px solid; border-color:inherit; border-radius:0 0 0 14px;}
  .corner.br{bottom:-2.5px; right:-2.5px; border-bottom:2.5px solid; border-right:2.5px solid; border-color:inherit; border-radius:0 0 14px 0;}

  header{
    position:absolute; top:0; left:0; right:0; z-index:4;
    padding: max(18px, env(safe-area-inset-top)) 18px 10px;
    display:flex; flex-direction:column; align-items:center; gap:6px;
  }
  .eyebrow{
    font-size:10px; letter-spacing:0.16em; text-transform:uppercase;
    color: var(--ink-dim); font-weight:600;
  }
  .target-chip{
    display:flex; align-items:center; gap:10px;
    background:var(--panel); border:1px solid var(--panel-border);
    padding:8px 14px; border-radius:999px; backdrop-filter:blur(10px);
  }
  .target-chip .code{ font-family:var(--mono); font-size:16px; font-weight:700; letter-spacing:0.03em; }
  .target-chip button{
    background:none; border:none; color:var(--ink-dim); font-size:12px;
    font-family:var(--sans); padding:4px 8px; cursor:pointer;
  }

  footer{
    position:absolute; bottom:0; left:0; right:0; z-index:4;
    padding: 14px 20px max(22px, env(safe-area-inset-bottom));
    display:flex; flex-direction:column; align-items:center; gap:14px;
  }
  .status-line{
    font-size:13px; color:var(--ink-dim); text-align:center; min-height:18px;
  }
  .status-line.searching{ color: var(--amber); }

  .match-card{
    width:100%; max-width:360px;
    background:var(--panel); border:1px solid var(--panel-border);
    border-radius:18px; padding:18px 20px; backdrop-filter:blur(14px);
    display:flex; flex-direction:column; align-items:center; gap:10px;
  }
  .match-card .check{ font-size:30px; color:var(--green); line-height:1; }
  .match-card .code{ font-family:var(--mono); font-size:22px; font-weight:700; letter-spacing:0.04em; }
  .match-card .label{ font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--ink-dim); }
  .row{ display:flex; gap:10px; width:100%; margin-top:4px; }

  button.btn{
    flex:1; border:none; border-radius:11px; padding:12px 14px;
    font-family:var(--sans); font-size:14.5px; font-weight:600;
    cursor:pointer; transition:transform 0.08s ease, opacity 0.15s;
  }
  button.btn:active{ transform:scale(0.97); }
  .btn-primary{ background:var(--amber); color:#211705; }
  .btn-ghost{ background:rgba(255,255,255,0.08); color:var(--ink); border:1px solid var(--panel-border); }
  .btn-outline-green{ background:rgba(76,175,109,0.14); color:var(--green); border:1px solid rgba(76,175,109,0.4); }

  /* ---------- Setup screen ---------- */
  #setup{
    position:absolute; inset:0; z-index:10; display:flex; flex-direction:column;
  }
  #setup video{ filter:brightness(0.55); }
  .setup-header{
    position:absolute; top:0; left:0; right:0;
    padding: max(24px, env(safe-area-inset-top)) 24px 16px; z-index:2;
    text-align:center;
  }
  .setup-header h1{
    font-family:var(--mono); font-size:19px; margin:0 0 6px; font-weight:700; letter-spacing:0.01em;
  }
  .setup-header p{ margin:0; font-size:13px; color:var(--ink-dim); line-height:1.5; max-width:320px; margin:0 auto;}

  .setup-panel{
    position:absolute; bottom:0; left:0; right:0; z-index:2;
    padding:20px 20px max(24px, env(safe-area-inset-bottom));
    display:flex; flex-direction:column; gap:10px;
    background:linear-gradient(to top, rgba(0,0,0,0.75) 40%, rgba(0,0,0,0));
    padding-top:60px;
  }
  .setup-panel .found-strip{
    background:var(--panel); border:1px solid var(--panel-border);
    border-radius:14px; padding:14px 16px; display:flex; align-items:center;
    justify-content:space-between; gap:10px; backdrop-filter:blur(12px);
  }
  .setup-panel .found-strip .code{ font-family:var(--mono); font-size:18px; font-weight:700; }
  .found-strip .lbl{ font-size:10px; color:var(--ink-dim); text-transform:uppercase; letter-spacing:0.1em; }

  .manual-entry{
    display:none; background:var(--panel); border:1px solid var(--panel-border);
    border-radius:14px; padding:14px; gap:10px; flex-direction:column; backdrop-filter:blur(12px);
  }
  .manual-entry input{
    background:rgba(255,255,255,0.06); border:1px solid var(--panel-border);
    color:var(--ink); font-family:var(--mono); font-size:18px; letter-spacing:0.06em;
    padding:10px 12px; border-radius:9px; text-transform:uppercase; text-align:center;
  }
  .manual-entry input:focus{ outline:2px solid var(--amber); outline-offset:1px; }

  #photo-input{ display:none; }

  .toast{
    position:absolute; top:14px; left:50%; transform:translateX(-50%) translateY(-30px);
    background:var(--red); color:#fff; font-size:12.5px; padding:8px 14px;
    border-radius:999px; z-index:20; opacity:0; transition:all 0.25s ease; pointer-events:none;
    max-width:80vw; text-align:center;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  .loading-overlay{
    position:absolute; inset:0; z-index:30; background:rgba(9,10,9,0.92);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
  }
  .spinner{
    width:28px; height:28px; border-radius:50%;
    border:2.5px solid rgba(224,169,64,0.25); border-top-color:var(--amber);
    animation:spin 0.9s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .loading-overlay p{ font-size:13px; color:var(--ink-dim); }

  .permission-note{
    max-width:280px; text-align:center; font-size:12.5px; color:var(--ink-dim); line-height:1.6;
  }
</style>
</head>
<body>
<div id="app">

  <video id="video" autoplay playsinline muted></video>
  <canvas id="work-canvas" class="hidden-canvas"></canvas>

  <!-- ============ SEARCH MODE (camera live, hunting for target) ============ -->
  <div class="scrim-top"></div>
  <div class="scrim-bottom"></div>
  <div class="guide" id="guide">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
  </div>

  <header>
    <div class="eyebrow">Searching for</div>
    <div class="target-chip">
      <span class="code" id="target-display">—</span>
      <button id="change-target-btn">Change</button>
    </div>
  </header>

  <footer id="search-footer">
    <div class="status-line" id="status-line">Pan slowly across the boxes</div>
  </footer>

  <!-- ============ SETUP MODE (choose target code) ============ -->
  <div id="setup">
    <div class="setup-header">
      <h1 id="setup-title">Set target code</h1>
      <p id="setup-sub">Scan one box, choose a photo, or type the code you're hunting for.</p>
    </div>

    <div class="setup-panel">
      <div class="found-strip" id="found-strip" style="display:none;">
        <div>
          <div class="lbl">Found</div>
          <div class="code" id="found-code">—</div>
        </div>
        <div class="row" style="margin:0; width:auto;">
          <button class="btn btn-ghost" id="rescan-btn">Rescan</button>
          <button class="btn btn-primary" id="use-found-btn">Use this</button>
        </div>
      </div>

      <div class="manual-entry" id="manual-entry">
        <input id="manual-input" placeholder="e.g. LB6W05" maxlength="10" autocapitalize="characters" autocomplete="off" autocorrect="off">
        <div class="row">
          <button class="btn btn-ghost" id="manual-cancel-btn">Cancel</button>
          <button class="btn btn-primary" id="manual-use-btn">Use this code</button>
        </div>
      </div>

      <div class="row" id="setup-actions">
        <button class="btn btn-ghost" id="photo-btn">Choose Photo</button>
        <button class="btn btn-ghost" id="type-btn">Type Code</button>
      </div>
      <p class="status-line" id="setup-status"></p>
    </div>
    <input type="file" id="photo-input" accept="image/*">
  </div>

  <div class="loading-overlay" id="loading-overlay">
    <div class="spinner"></div>
    <p id="loading-text">Loading OCR engine…</p>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.4/tesseract.min.js"></script>
<script>
(() => {
  "use strict";

  // ---------- Config ----------
  // Regex for "any code that looks valid" during free-scan (setup) mode.
  // Matches LB6W05-style: 2 letters, 1 digit, 1 letter, 2 digits.
  // Loosen to /^[A-Z0-9]{6}$/ if your codes vary in structure.
  const CODE_PATTERN = /^[A-Z]{2}[0-9][A-Z][0-9]{2}$/;
  const CHAR_WHITELIST = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  const SCAN_INTERVAL_MS = 650;       // time between OCR attempts (Tesseract is heavier than native Vision)
  const ROTATIONS = [0, 90, 180, 270]; // tested round-robin, one per tick, to stay responsive
  const ENHANCE_EVERY_N_TICKS = 5;     // periodically also try a glare/contrast-corrected pass

  // ---------- State ----------
  let worker = null;
  let stream = null;
  let mode = "search";       // "search" | "setup"
  let targetCode = null;
  let scanning = false;
  let scanTimer = null;
  let rotationIdx = 0;
  let tickCount = 0;
  let setupFoundCode = null;

  // ---------- Elements ----------
  const video = document.getElementById("video");
  const workCanvas = document.getElementById("work-canvas");
  const guide = document.getElementById("guide");
  const statusLine = document.getElementById("status-line");
  const targetDisplay = document.getElementById("target-display");
  const setupEl = document.getElementById("setup");
  const setupStatus = document.getElementById("setup-status");
  const foundStrip = document.getElementById("found-strip");
  const foundCodeEl = document.getElementById("found-code");
  const manualEntry = document.getElementById("manual-entry");
  const manualInput = document.getElementById("manual-input");
  const setupActions = document.getElementById("setup-actions");
  const photoInput = document.getElementById("photo-input");
  const loadingOverlay = document.getElementById("loading-overlay");
  const loadingText = document.getElementById("loading-text");
  const toast = document.getElementById("toast");
  const searchFooter = document.getElementById("search-footer");

  function showToast(msg, ms = 2600) {
    toast.textContent = msg;
    toast.classList.add("show");
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toast.classList.remove("show"), ms);
  }

  function clean(raw) {
    return raw.toUpperCase().replace(/[^A-Z0-9]/g, "");
  }

  // ---------- Camera ----------
  async function startCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });
      video.srcObject = stream;
      await video.play();
    } catch (err) {
      loadingOverlay.style.display = "flex";
      loadingText.textContent = "Camera access denied or unavailable.";
      const note = document.createElement("p");
      note.className = "permission-note";
      note.textContent = "This app needs camera permission to scan codes. Check Safari settings for this site and reload.";
      loadingOverlay.appendChild(note);
      throw err;
    }
  }

  // ---------- OCR worker ----------
  async function initWorker() {
    loadingText.textContent = "Loading OCR engine…";
    worker = await Tesseract.createWorker("eng", 1, {
      logger: () => {}
    });
    await worker.setParameters({
      tessedit_char_whitelist: CHAR_WHITELIST,
      tessedit_pageseg_mode: "7" // treat image as a single line of text
    });
  }

  // Draws the current video frame (or a provided source) into a canvas,
  // rotated by `deg`, optionally with a contrast/sharpen pass for
  // plastic-wrap glare, cropped to the guide box region for speed+accuracy.
  function prepareCanvas(source, deg, enhance) {
    const sw = source.videoWidth || source.width;
    const sh = source.videoHeight || source.height;

    // Crop roughly to the guide box area (center strip) to cut OCR time
    // and avoid picking up unrelated background text.
    const cropW = sw * 0.8, cropH = sh * 0.22;
    const cropX = (sw - cropW) / 2, cropY = (sh - cropH) / 2;

    const rotated = (deg === 90 || deg === 270);
    workCanvas.width = rotated ? cropH : cropW;
    workCanvas.height = rotated ? cropW : cropH;
    const ctx = workCanvas.getContext("2d");
    ctx.save();
    ctx.translate(workCanvas.width / 2, workCanvas.height / 2);
    ctx.rotate((deg * Math.PI) / 180);
    if (enhance) ctx.filter = "contrast(150%) brightness(112%) saturate(0.9)";
    ctx.drawImage(source, cropX, cropY, cropW, cropH, -cropW / 2, -cropH / 2, cropW, cropH);
    ctx.restore();
    return workCanvas;
  }

  async function recognizeOnce(source, deg, enhance) {
    const canvas = prepareCanvas(source, deg, enhance);
    const { data } = await worker.recognize(canvas);
    return clean(data.text || "");
  }

  // ---------- Search mode loop ----------
  function setStatus(text, active) {
    statusLine.textContent = text;
    statusLine.classList.toggle("searching", !!active);
  }

  async function searchTick() {
    if (!scanning || mode !== "search") return;
    const deg = ROTATIONS[rotationIdx % ROTATIONS.length];
    const enhance = tickCount > 0 && tickCount % ENHANCE_EVERY_N_TICKS === 0;
    rotationIdx++;
    tickCount++;

    try {
      const text = await recognizeOnce(video, deg, enhance);
      if (targetCode && text.includes(targetCode)) {
        onMatchFound();
        return;
      }
    } catch (e) { /* ignore a failed frame, just try the next one */ }

    scanTimer = setTimeout(searchTick, SCAN_INTERVAL_MS);
  }

  function onMatchFound() {
    scanning = false;
    guide.classList.remove("active");
    guide.classList.add("matched");
    if (navigator.vibrate) navigator.vibrate([40, 60, 90]);
    playBeep();
    searchFooter.innerHTML = `
      <div class="match-card">
        <div class="check">✓</div>
        <div class="label">Match found</div>
        <div class="code">${targetCode}</div>
        <div class="row">
          <button class="btn btn-ghost" id="search-again-btn">Search Again</button>
          <button class="btn btn-primary" id="change-target-btn-2">Change Target</button>
        </div>
      </div>`;
    document.getElementById("search-again-btn").onclick = restartSearch;
    document.getElementById("change-target-btn-2").onclick = openSetup;
  }

  function restartSearch() {
    guide.classList.remove("matched");
    guide.classList.add("active");
    searchFooter.innerHTML = `<div class="status-line" id="status-line">Pan slowly across the boxes</div>`;
    rotationIdx = 0; tickCount = 0;
    scanning = true;
    scanTimer = setTimeout(searchTick, 200);
  }

  function playBeep() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.frequency.value = 880;
      osc.connect(gain); gain.connect(ctx.destination);
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      osc.start(); osc.stop(ctx.currentTime + 0.3);
    } catch (e) {}
  }

  // ---------- Setup mode ----------
  let setupScanning = false;
  let setupTimer = null;

  function openSetup() {
    mode = "setup";
    scanning = false;
    clearTimeout(scanTimer);
    setupEl.style.display = "flex";
    foundStrip.style.display = "none";
    manualEntry.style.display = "none";
    setupActions.style.display = "flex";
    setupStatus.textContent = "";
    setupFoundCode = null;
    beginSetupScan();
  }

  function closeSetupToSearch(code) {
    targetCode = code;
    targetDisplay.textContent = code;
    mode = "search";
    setupEl.style.display = "none";
    setupScanning = false;
    clearTimeout(setupTimer);
    restartSearch();
  }

  function beginSetupScan() {
    setupScanning = true;
    setupTick();
  }

  async function setupTick() {
    if (!setupScanning || mode !== "setup" || setupFoundCode) return;
    const deg = ROTATIONS[rotationIdx % ROTATIONS.length];
    const enhance = tickCount > 0 && tickCount % ENHANCE_EVERY_N_TICKS === 0;
    rotationIdx++; tickCount++;

    try {
      const text = await recognizeOnce(video, deg, enhance);
      const match = text.match(CODE_PATTERN);
      if (match) {
        setupFoundCode = match[0];
        foundCodeEl.textContent = setupFoundCode;
        foundStrip.style.display = "flex";
        setupActions.style.display = "none";
        setupScanning = false;
        return;
      }
    } catch (e) {}

    setupTimer = setTimeout(setupTick, SCAN_INTERVAL_MS);
  }

  // ---------- Wire up UI ----------
  document.getElementById("change-target-btn").onclick = openSetup;

  document.getElementById("rescan-btn").onclick = () => {
    foundStrip.style.display = "none";
    setupActions.style.display = "flex";
    setupFoundCode = null;
    beginSetupScan();
  };
  document.getElementById("use-found-btn").onclick = () => {
    if (setupFoundCode) closeSetupToSearch(setupFoundCode);
  };

  document.getElementById("type-btn").onclick = () => {
    setupScanning = false;
    clearTimeout(setupTimer);
    setupActions.style.display = "none";
    manualEntry.style.display = "flex";
    manualInput.value = "";
    manualInput.focus();
  };
  document.getElementById("manual-cancel-btn").onclick = () => {
    manualEntry.style.display = "none";
    setupActions.style.display = "flex";
    beginSetupScan();
  };
  document.getElementById("manual-use-btn").onclick = () => {
    const code = clean(manualInput.value);
    if (code.length < 4) {
      showToast("Enter a valid code first.");
      return;
    }
    closeSetupToSearch(code);
  };

  document.getElementById("photo-btn").onclick = () => photoInput.click();
  photoInput.onchange = async () => {
    const file = photoInput.files[0];
    if (!file) return;
    loadingOverlay.style.display = "flex";
    loadingText.textContent = "Reading code from photo…";

    const img = new Image();
    img.onload = async () => {
      let found = null;
      for (const deg of ROTATIONS) {
        try {
          const text = await recognizeOnce(img, deg, false);
          const match = text.match(CODE_PATTERN);
          if (match) { found = match[0]; break; }
        } catch (e) {}
      }
      if (!found) {
        // one more pass with enhancement, in case the photo itself has glare
        for (const deg of ROTATIONS) {
          try {
            const text = await recognizeOnce(img, deg, true);
            const match = text.match(CODE_PATTERN);
            if (match) { found = match[0]; break; }
          } catch (e) {}
        }
      }
      loadingOverlay.style.display = "none";
      photoInput.value = "";
      if (found) {
        closeSetupToSearch(found);
      } else {
        showToast("Couldn't read a code in that photo — try another or type it.");
      }
    };
    img.src = URL.createObjectURL(file);
  };

  // ---------- Boot ----------
  (async function boot() {
    try {
      await startCamera();
      await initWorker();
      loadingOverlay.style.display = "none";
      // Start directly in setup mode so the user picks a target first.
      openSetup();
    } catch (e) {
      console.error(e);
    }
  })();
})();
</script>
</body>
</html>
