<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner</title>
    <script async src="https://docs.opencv.org/4.x/opencv.js" type="text/javascript" onload="onOpenCvReady();"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #121212; color: white; margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; }
        .upload-section, .camera-section { background: #1e1e1e; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        #videoContainer { position: relative; width: 100%; max-width: 400px; margin: auto; border: 2px solid #333; }
        video { width: 100%; display: block; }
        
        /* Perubahan 4: Tukar kotak scan kepada warna hijau terang #22FF00 */
        .reticle { position: absolute; top: 35%; left: 10%; width: 80%; height: 30%; border: 3px dashed #22FF00; box-sizing: border-box; pointer-events: none; }
        
        button { background: #007bff; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; width: 100%; }
        button:disabled { background: #555; }
        
        /* Perubahan 3: Rupa butang Scan manual */
        #scanBtn { background: #28a745; font-size: 18px; padding: 15px; }
        
        #notification { display: none; margin-top: 15px; padding: 15px; font-size: 20px; font-weight: bold; border-radius: 5px; }
        .match { background: #28a745; color: white; }
        .not-match { background: #dc3545; color: white; }
        #status { color: #ffc107; font-size: 14px; }
        img, canvas { max-width: 100%; height: auto; margin-top: 10px; display: none; border-radius: 5px; }
        .or-divider { margin: 15px 0; color: #888; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Scanner</h2>
    <p id="status">Memuatkan OpenCV.js... Sila tunggu.</p>

    <div class="upload-section">
        <h3>1. Target</h3>
        <input type="file" id="fileInput" accept="image/*" disabled>
        <img id="targetImage" alt="Target Preview">
    </div>

    <div class="camera-section">
        <h3>2. Imbas Kotak Baru</h3>
        
        <div id="videoContainer">
            <video id="video" autoplay playsinline></video>
            <div class="reticle"></div>
        </div>
        <button id="scanBtn" disabled>Scan</button>

        <div class="or-divider">— ATAU —</div>
        <p style="margin: 0 0 10px 0; font-size: 14px; color: #bbb;">Muat naik gambar kotak baru:</p>
        <input type="file" id="scanFileInput" accept="image/*" disabled>
        <img id="scanPreviewImage" alt="Scan Preview">
    </div>

    <div id="notification"></div>

    <canvas id="canvasHidden"></canvas>
</div>

<script>
    let cvReady = false;
    let targetMat = null;
    let orb = null;
    let matcher = null;
    let targetKeypoints, targetDescriptors;

    const statusText = document.getElementById('status');
    const fileInput = document.getElementById('fileInput');
    const scanFileInput = document.getElementById('scanFileInput');
    const video = document.getElementById('video');
    const scanBtn = document.getElementById('scanBtn');
    const notification = document.getElementById('notification');
    const targetImg = document.getElementById('targetImage');
    const scanPreviewImg = document.getElementById('scanPreviewImage');
    const canvasHidden = document.getElementById('canvasHidden');

    function onOpenCvReady() {
        cv['onRuntimeInitialized'] = () => {
            cvReady = true;
            statusText.innerText = "OpenCV.js Sedia! Sila upload gambar Target.";
            fileInput.disabled = false;
            initCamera();
        };
    }

    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
                audio: false
            });
            video.srcObject = stream;
        } catch (err) {
            statusText.innerText = "Gagal akses kamera: " + err.message;
        }
    }

    // Proses gambar Target
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            targetImg.src = event.target.result;
            targetImg.style.display = 'block';
            
            targetImg.onload = function() {
                if (targetMat) targetMat.delete();
                
                targetMat = cv.imread(targetImg);
                cv.cvtColor(targetMat, targetMat, cv.COLOR_RGBA2GRAY);

                orb = new cv.ORB();
                targetKeypoints = new cv.KeyPointVector();
                targetDescriptors = new cv.Mat();
                
                orb.detectAndCompute(targetMat, new cv.Mat(), targetKeypoints, targetDescriptors);
                matcher = new cv.BFMatcher(cv.NORM_HAMMING, true);
                
                statusText.innerText = "Target sedia! Boleh Scan kamera atau upload gambar baru.";
                scanBtn.disabled = false;
                scanFileInput.disabled = false; // Aktifkan input upload gambar baru
            }
        };
        reader.readAsDataURL(file);
    });

    // Fungsi Utama Logik Pemadanan Corak (Pattern Matching)
    function runMatching(imageElement) {
        if (!cvReady || !targetDescriptors) return;

        let srcMat = cv.imread(imageElement);
        let grayMat = new cv.Mat();
        cv.cvtColor(srcMat, grayMat, cv.COLOR_RGBA2GRAY);

        let srcKeypoints = new cv.KeyPointVector();
        let srcDescriptors = new cv.Mat();
        orb.detectAndCompute(grayMat, new cv.Mat(), srcKeypoints, srcDescriptors);

        let matches = new cv.DMatchVector();
        let matchFound = false;

        if (!srcDescriptors.empty() && srcDescriptors.rows > 0) {
            matcher.match(targetDescriptors, srcDescriptors, matches);
            
            let goodMatchesCount = 0;
            for (let i = 0; i < matches.size(); ++i) {
                let match = matches.get(i);
                if (match.distance < 40) { 
                    goodMatchesCount++;
                }
            }

            // Jika titik padanan berkualiti tinggi melebihi threshold, dikira MATCH
            if (goodMatchesCount > 15) {
                matchFound = true;
            }
        }

        showNotification(matchFound);

        // Bersihkan memori
        srcMat.delete();
        grayMat.delete();
        srcKeypoints.delete();
        srcDescriptors.delete();
        matches.delete();
    }

    // Scan guna Kamera Live
    scanBtn.addEventListener('click', () => {
        const ctx = canvasHidden.getContext('2d');
        canvasHidden.width = video.videoWidth;
        canvasHidden.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvasHidden.width, canvasHidden.height);
        
        // Sembunyikan preview imej upload lama (jika ada) supaya tak keliru
        scanPreviewImg.style.display = 'none'; 
        
        runMatching(canvasHidden);
    });

    // Perubahan 5: Scan guna kaedah Upload Gambar Baru (Scan new)
    scanFileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            scanPreviewImg.src = event.target.result;
            scanPreviewImg.style.display = 'block'; // Papar gambar yang di-upload
            
            scanPreviewImg.onload = function() {
                runMatching(scanPreviewImg);
            }
        };
        reader.readAsDataURL(file);
    });

    function showNotification(isMatch) {
        notification.style.display = 'block';
        if (isMatch) {
            notification.className = 'match';
            notification.innerText = 'MATCH FOUND';
        } else {
            notification.className = 'not-match';
            notification.innerText = 'NOT MATCH';
        }

        // Notifikasi hilang selepas 3 saat
        setTimeout(() => {
            notification.style.display = 'none';
        }, 3000);
    }
</script>

</body>
</html>
